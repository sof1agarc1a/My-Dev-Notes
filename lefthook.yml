pre-commit:
  parallel: true
  commands:
    frontend-lint:
      glob: "frontend/src/**/*.{ts,tsx}"
      run: frontend/node_modules/.bin/eslint --config frontend/eslint.config.mjs --max-warnings=0 {staged_files}

    frontend-typecheck:
      glob: "frontend/src/**/*.{ts,tsx}"
      run: cd frontend && ./node_modules/.bin/tsc --noEmit

    frontend-format:
      glob: "frontend/src/**/*.{ts,tsx,css,json}"
      run: frontend/node_modules/.bin/prettier --write {staged_files}
      stage_fixed: true

    backend-lint:
      glob: "backend/src/**/*.ts"
      run: backend/node_modules/.bin/eslint --config backend/eslint.config.mjs {staged_files}

    backend-typecheck:
      glob: "backend/src/**/*.ts"
      run: cd backend && ./node_modules/.bin/tsc --noEmit

    backend-format:
      glob: "backend/src/**/*.{ts,json}"
      run: backend/node_modules/.bin/prettier --write {staged_files}
      stage_fixed: true
